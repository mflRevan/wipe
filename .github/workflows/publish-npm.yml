# Publish the @mflrevan/wipe npm package via npm **OIDC trusted publishing** —
# no token, no 2FA. Runs when a GitHub Release is published (by cargo-dist's
# release.yml) and can be re-run manually for a given tag.
#
# One-time npm setup: on npmjs.com the package's Trusted Publisher must point at
# THIS workflow file (repo mflRevan/wipe, workflow `publish-npm.yml`).

name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mflRevan' }}
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Use npm that supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: Download the npm package from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p "*-npm-package.tar.gz" -D .
      - name: Publish via OIDC trusted publisher
        run: |
          mkdir npmpkg && tar -xzf *-npm-package.tar.gz -C npmpkg
          pkgdir="$(dirname "$(find npmpkg -name package.json | head -1)")"
          echo "publishing from $pkgdir"
          cd "$pkgdir"
          npm publish --access public

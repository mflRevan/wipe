# Publish the @mflrevan/wipe npm package via npm **OIDC trusted publishing**
# (no token, no 2FA). Triggers on the SAME `v*` tag as the crates and binary
# releases, so one tagged commit ships everything automatically.
#
# It builds the npm installer package itself with `dist` (self-contained; no
# dependency on the release job's timing) and publishes it tokenlessly. The
# package's Trusted Publisher on npmjs.com must point at this workflow
# (repo mflRevan/wipe, workflow `publish-npm.yml`).

name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mflRevan' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Use npm that supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: Install dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.2/cargo-dist-installer.sh | sh
      - name: Build the npm installer package
        run: dist build --artifacts=global
      - name: Patch installer for Windows tar drive letters
        # cargo-dist's installer extracts with `tar xf C:\...`, which GNU tar (on
        # PATH ahead of bsdtar, e.g. Git for Windows) rejects. Make it use a
        # relative archive path + cwd so `npm i -g` works on those machines too.
        run: |
          f="$(find target/distrib -name binary-install.js -path '*npm-package*' | head -1)"
          test -n "$f" || { echo "binary-install.js not found"; exit 1; }
          node scripts/patch-npm-installer.mjs "$f"
      - name: Wait for the GitHub release binaries
        # The published package downloads binaries from the GitHub release at
        # install time, so the release (built by release.yml) must exist first.
        # Gating here prevents (a) a window where `npm i -g` 404s and (b) burning
        # this npm version permanently if a binary build fails and no release is
        # ever created. Skip the wait for manual dispatch (no tag to await).
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --json isDraft,assets \
                 --jq 'select(.isDraft==false) | .assets[].name' 2>/dev/null \
                 | grep -q '.'; then
              echo "release $TAG is published with assets"; exit 0
            fi
            echo "waiting for release $TAG ($i/60)…"; sleep 20
          done
          echo "release $TAG did not appear in time; not publishing to npm"; exit 1
      - name: Choose npm dist-tag
        # A prerelease tag (v0.4.0-rc.1) must NOT become `latest`, or every plain
        # `npm i -g @mflrevan/wipe` resolves to the RC. Publish those under `next`.
        id: tag
        env:
          REF: ${{ github.ref_name }}
        run: |
          case "$REF" in
            *-*) echo "dist=next" >> "$GITHUB_OUTPUT" ;;
            *)   echo "dist=latest" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Publish via OIDC trusted publisher
        run: |
          pkgdir="$(dirname "$(find target/distrib -name package.json -path '*npm-package*' | head -1)")"
          echo "publishing @mflrevan/wipe from $pkgdir (tag: ${{ steps.tag.outputs.dist }})"
          cd "$pkgdir"
          npm publish --access public --tag "${{ steps.tag.outputs.dist }}"

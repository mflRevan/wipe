# Publish the @mflrevan/wipe npm package via npm **OIDC trusted publishing**
# (no token, no 2FA). Triggers on the SAME `v*` tag as the crates and binary
# releases, so one tagged commit ships everything automatically.
#
# It builds the npm installer package itself with `dist` (self-contained; no
# dependency on the release job's timing) and publishes it tokenlessly. The
# package's Trusted Publisher on npmjs.com must point at this workflow
# (repo mflRevan/wipe, workflow `publish-npm.yml`).

name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mflRevan' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Use npm that supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: Install dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.2/cargo-dist-installer.sh | sh
      - name: Build the npm installer package
        run: dist build --artifacts=global
      - name: Publish via OIDC trusted publisher
        run: |
          pkgdir="$(dirname "$(find target/distrib -name package.json -path '*npm-package*' | head -1)")"
          echo "publishing @mflrevan/wipe from $pkgdir"
          cd "$pkgdir"
          npm publish --access public

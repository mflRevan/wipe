# Publish crates to crates.io - triggered ONLY by pushing a release tag.
#
# Releases happen exclusively on `v*` tags (no auto "release PRs" on push to
# main). On a tag, this publishes the workspace crates (in dependency order,
# waiting for the index) to crates.io. Binaries, the npm package, and the GitHub
# Release are handled by cargo-dist in `release.yml`; the website deploys on
# every `main` push via `deploy-web.yml`.
#
# One-time setup (see docs/RELEASE.md): add the `CARGO_REGISTRY_TOKEN` secret.

name: Publish crates

on:
  push:
    tags:
      - "v*"

jobs:
  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mflRevan' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # Check out the `main` branch (not the detached tag) so release-plz can
        # resolve the current branch / upstream when publishing.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Publish with release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

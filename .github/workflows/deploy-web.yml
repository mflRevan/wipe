# Auto-deploy the website (apps/web -> wipeboard.dev) to Vercel on every push to
# main that touches the site. Releases (crates/npm/binaries) are separate and
# only run on `v*` tags.
#
# One-time setup (see docs/RELEASE.md): create a Vercel project whose Root
# Directory is `apps/web`, attach the wipeboard.dev domain, and add the repo
# secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID. (Alternatively, use
# Vercel's native Git integration and delete this workflow to avoid double deploys.)

name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mflRevan' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

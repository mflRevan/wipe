# Config for cargo-dist. This is the modern `dist-workspace.toml` config
# format (cargo-dist >= 0.28). It intentionally lives in its own file
# instead of `[workspace.metadata.dist]` in the root Cargo.toml.
#
# This file was authored by hand as a starting point. Run `cargo dist init`
# (or `dist init` if you have the standalone `dist` binary installed) from
# the repo root to let cargo-dist validate/regenerate it interactively, and
# `cargo dist generate-ci` (or `dist generate-ci`) afterwards to regenerate
# `.github/workflows/release.yml` from this config so the two stay in sync.
#
# See: https://opensource.axo.dev/cargo-dist/book/reference/config.html

[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.28.2"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Publish jobs to run in CI
publish-jobs = ["npm"]
# A namespace to use when publishing this package to the npm registry
npm-scope = "@mflrevan"
# The npm package should have this name
npm-package = "wipe"
# Whether to install an updater program
install-updater = false
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# Path that installers should place binaries in
install-path = "CARGO_HOME"

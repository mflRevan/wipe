<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wipe</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font: 15px/1.6 ui-sans-serif, system-ui, sans-serif;
        background: #0b0b0f; color: #e7e7ea;
      }
      .card { max-width: 34rem; padding: 2rem; text-align: center; }
      h1 { font-size: 2rem; margin: 0 0 .5rem; letter-spacing: -.02em; }
      .accent { color: #8b5cf6; }
      code { background: #17171d; padding: .15rem .4rem; border-radius: .35rem; }
      a { color: #8b5cf6; }
      p { color: #a1a1aa; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1><span class="accent">wipe</span> is running</h1>
      <p>
        The daemon is serving on this port and its API is live under
        <code>/api</code>. The board UI is bundled from the desktop app at build
        time; this placeholder ships until that build is embedded.
      </p>
      <p>Try <code>/api/health</code> or <code>/api/board</code>.</p>
    </div>
  </body>
</html>

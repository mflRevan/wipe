# Configuration for release-plz: https://release-plz.dev/docs/config
#
# We use release-plz ONLY to publish crates to crates.io, and only when a `v*`
# tag is pushed (see .github/workflows/release-plz.yml). It does NOT create git
# tags or GitHub Releases here — cargo-dist (`release.yml`) owns the GitHub
# Release, binaries, and npm package. Versions are bumped by hand in
# `Cargo.toml` before tagging (no auto "release PRs").

[workspace]
# Treat all workspace crates as part of one release train.
release = true
publish = true
publish_allow_dirty = false
# cargo-dist owns the GitHub Release and the git tag; release-plz only publishes
# the crates.
git_release_enable = false
git_tag_enable = false
semver_check = false
changelog_update = true
dependencies_update = false

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^style", group = "Style" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Miscellaneous" },
  { body = ".*security", group = "Security" },
]
protect_breaking_commits = true
sort_commits = "oldest"

[[package]]
name = "wipe-core"
changelog_update = true
publish = true

[[package]]
name = "wipe-daemon"
changelog_update = true
publish = true

[[package]]
name = "wipe-cli"
changelog_update = true
publish = true
